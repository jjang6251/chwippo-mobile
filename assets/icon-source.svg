<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- iOS 앱 아이콘 · 1024x1024 정사각 · 투명도 X · round mask 는 iOS 가 자동 -->
  <!-- 배경: sage brand -->
  <rect width="1024" height="1024" fill="#6b9c7f"/>
  <!-- 중앙 워드마크 "치뽀" · 흰색 굵은 폰트 -->
  <!-- Apple SF Pro 유사 굵기 · 세리프 없는 산세리프 -->
  <text
    x="512"
    y="512"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif"
    font-size="440"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-20"
  >치뽀</text>
</svg>
