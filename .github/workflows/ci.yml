name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static-checks:
    name: Static Checks (expo-doctor · tsc · lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo doctor (의존성 · SDK 버전 정합성)
        # KAKAO_NATIVE_APP_KEY 없이도 검증 가능하도록 dummy 주입
        env:
          KAKAO_NATIVE_APP_KEY: dummy_for_ci
        run: npx expo-doctor

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint
