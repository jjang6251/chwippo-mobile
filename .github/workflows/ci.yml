name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static-checks:
    name: Static Checks (expo-doctor · tsc · lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # 모든 step 공유 env (expo config plugin 이 요구 · 실제 로그인 X)
    env:
      KAKAO_NATIVE_APP_KEY: dummy_for_ci_static_checks_only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo doctor (의존성 · SDK 버전 정합성)
        run: npx expo-doctor

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint
